name: Pinata IPFS Deploy (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment name (dev|prod).'
        required: true
        type: string
      project_name:
        description: 'Project name used for Pinata metadata.'
        required: true
        type: string
      node_version:
        description: 'Node.js version used to build the caller repo and to run the uploader.'
        required: false
        default: '24'
        type: string
      cache:
        description: 'Dependency cache manager for actions/setup-node (npm|pnpm|yarn).'
        required: false
        default: 'npm'
        type: string
      pinata_upload_timeout_ms:
        description: 'Pinata upload HTTP request timeout in milliseconds.'
        required: false
        default: 300000
        type: number
      install_command:
        description: 'Command to install dependencies in the caller repo.'
        required: false
        default: 'npm ci'
        type: string
      build_command:
        description: 'Command to build the caller repo.'
        required: false
        default: 'npm run build'
        type: string
      build_env:
        description: 'Optional newline-separated KEY=VALUE envs for build.'
        required: false
        default: ''
        type: string
      use_prebuilt_build:
        description: 'Skip build and use a prebuilt artifact.'
        required: false
        default: false
        type: boolean
      build_artifact_name:
        description: 'Artifact name that contains the prebuilt build output.'
        required: false
        default: ''
        type: string
      build_dir:
        description: 'Build output directory (relative to caller repo).'
        required: false
        default: 'out'
        type: string
      caller_repository:
        description: 'Optional: repository to deploy (owner/repo). Defaults to the caller.'
        required: false
        type: string
      caller_ref:
        description: 'Optional: git ref (sha/branch/tag) to deploy. Defaults to the caller ref.'
        required: false
        type: string
      pinata_action_repository:
        description: 'Repo to use for pinata action (owner/repo).'
        required: false
        default: 'gnosis/gh-action-pinata'
        type: string
      pinata_action_ref:
        description: "Git ref (branch/tag) to use for pinata action repo. Defaults to 'main'."
        required: false
        default: 'main'
        type: string
      health_check:
        description: 'Run post-deploy gateway health checks before writing the summary.'
        required: false
        default: true
        type: boolean
    secrets:
      PINATA_JWT:
        required: true
    outputs:
      ipfs_hash:
        description: 'Deployed IPFS hash.'
        value: ${{ jobs.deploy.outputs.ipfs_hash }}
      pinata_url:
        description: 'Pinata gateway URL for the deployed hash.'
        value: ${{ jobs.deploy.outputs.pinata_url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ipfs_hash: ${{ steps.deployment.outputs.ipfs_hash }}
      pinata_url: ${{ steps.deployment.outputs.pinata_url }}
    steps:
      - name: Checkout caller repo
        if: ${{ !inputs.use_prebuilt_build }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.caller_repository || github.repository }}
          ref: ${{ inputs.caller_ref || github.sha }}
          fetch-depth: 0
          path: caller

      - name: Checkout pinata deploy action repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.pinata_action_repository }}
          ref: ${{ inputs.pinata_action_ref }}
          fetch-depth: 1
          path: pinata

      - name: Detect caller package manager and prepare environment
        if: ${{ !inputs.use_prebuilt_build }}
        id: detect_pm
        run: |
          cd caller
          if [ -f "package-lock.json" ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "default_install=npm ci" >> "$GITHUB_OUTPUT"
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "default_install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
            echo "default_install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            # Default to npm if no lockfile found
            echo "pm=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=" >> "$GITHUB_OUTPUT"
            echo "default_install=npm ci" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected package manager: $(cat "$GITHUB_OUTPUT" | grep "^pm=" | cut -d= -f2)"

      - name: Setup Node.js (without cache)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Remove packageManager fields (prevent Corepack conflicts)
        if: ${{ inputs.cache == 'yarn' || inputs.cache == 'pnpm' }}
        run: |
          # Remove ALL packageManager fields to prevent Corepack from interfering
          # We manage package managers manually via npm install -g, so we don't need these fields
          # This prevents yarn/pnpm from checking packageManager fields and failing
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys
          import os
          
          def remove_package_manager_field(pkg_file):
              if not os.path.exists(pkg_file):
                  return False
              
              try:
                  with open(pkg_file, "r") as f:
                      data = json.load(f)
                  
                  if "packageManager" in data:
                      pm_field = data["packageManager"]
                      print(f"⚠️  Removing packageManager field from {pkg_file}: {pm_field}", file=sys.stderr)
                      del data["packageManager"]
                      with open(pkg_file, "w") as f:
                          json.dump(data, f, indent=2)
                          f.write("\n")
                      print(f"✅ Removed packageManager field from {pkg_file}", file=sys.stderr)
                      return True
              except Exception as e:
                  print(f"⚠️  Error processing {pkg_file}: {e}", file=sys.stderr)
              
              return False
          
          removed_any = False
          
          # Check workspace root (where setup-node runs from)
          if remove_package_manager_field("package.json"):
              removed_any = True
          
          # Check caller directory (if it exists)
          if os.path.exists("caller/package.json"):
              if remove_package_manager_field("caller/package.json"):
                  removed_any = True
          
          # Check pinata directory (we'll handle pnpm installation manually)
          if os.path.exists("pinata/package.json"):
              if remove_package_manager_field("pinata/package.json"):
                  removed_any = True
          
          if not removed_any:
              print("✅ No packageManager fields found (or already removed)")
          else:
              print("✅ Removed packageManager fields to prevent Corepack conflicts")
          
          sys.exit(0)
          PYTHON_SCRIPT

      - name: Install package manager for caching (if needed)
        run: |
          # Install yarn/pnpm if cache is set to them
          # setup-node requires the package manager to be available for caching
          # We install directly via npm (no Corepack needed)
          CACHE_MANAGER="${{ inputs.cache }}"
          if [ "$CACHE_MANAGER" = "yarn" ]; then
            if ! command -v yarn >/dev/null 2>&1; then
              echo "Installing yarn via npm..."
              npm install -g yarn
              echo "✅ Yarn installed"
            else
              echo "✅ Yarn already available"
            fi
            # Verify yarn works (use --ignore-engines to avoid packageManager field checks)
            yarn --version || echo "⚠️  Yarn version check failed, but yarn is installed"
          elif [ "$CACHE_MANAGER" = "pnpm" ]; then
            if ! command -v pnpm >/dev/null 2>&1; then
              echo "Installing pnpm via npm..."
              npm install -g pnpm
              echo "✅ pnpm installed"
            else
              echo "✅ pnpm already available"
            fi
            pnpm --version || echo "⚠️  pnpm version check failed, but pnpm is installed"
          fi

      - name: Setup Node.js cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.cache }}
          cache-dependency-path: |
            caller/package-lock.json
            caller/pnpm-lock.yaml
            caller/yarn.lock
            pinata/pnpm-lock.yaml

      - name: Validate inputs
        run: |
          # Validate environment
          if [ "${{ inputs.environment }}" != "dev" ] && [ "${{ inputs.environment }}" != "prod" ]; then
            echo "❌ Error: environment must be 'dev' or 'prod', got: ${{ inputs.environment }}"
            exit 1
          fi

          # Validate cache manager
          CACHE_MANAGER="${{ inputs.cache }}"
          if [ "$CACHE_MANAGER" != "npm" ] && [ "$CACHE_MANAGER" != "pnpm" ] && [ "$CACHE_MANAGER" != "yarn" ]; then
            echo "❌ Error: cache must be one of: npm|pnpm|yarn, got: $CACHE_MANAGER"
            exit 1
          fi

          # Validate Pinata upload timeout
          if [ "${{ inputs.pinata_upload_timeout_ms }}" -lt 10000 ]; then
            echo "❌ Error: pinata_upload_timeout_ms must be >= 10000"
            exit 1
          fi

          # Validate project_name
          PROJECT_NAME="${{ inputs.project_name }}"
          if [ -z "$PROJECT_NAME" ]; then
            echo "❌ Error: project_name cannot be empty"
            exit 1
          fi

          if echo "$PROJECT_NAME" | grep -qE '[^[:alnum:]_-]'; then
            echo "⚠️  Warning: project_name contains special characters, will be sanitized"
          fi

          # Validate build_dir
          BUILD_DIR="${{ inputs.build_dir }}"
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Error: build_dir cannot be empty"
            exit 1
          fi
          if echo "$BUILD_DIR" | grep -qE '\.\.|^/'; then
            echo "❌ Error: build_dir cannot contain '..' or be an absolute path, got: $BUILD_DIR"
            exit 1
          fi

          # Validate install_command
          if [ "${{ inputs.use_prebuilt_build }}" = "false" ]; then
            INSTALL_CMD="${{ inputs.install_command }}"
            if [ -z "$INSTALL_CMD" ]; then
              echo "❌ Error: install_command cannot be empty"
              exit 1
            fi
            if echo "$INSTALL_CMD" | grep -qE '[;&|<>`$()]'; then
              echo "❌ Error: install_command contains potentially dangerous characters"
              exit 1
            fi
          fi

          # Validate build_command
          if [ "${{ inputs.use_prebuilt_build }}" = "false" ]; then
            BUILD_CMD="${{ inputs.build_command }}"
            if [ -z "$BUILD_CMD" ]; then
              echo "❌ Error: build_command cannot be empty"
              exit 1
            fi
            if echo "$BUILD_CMD" | grep -qE '[;&|<>`$()]'; then
              echo "❌ Error: build_command contains potentially dangerous characters"
              exit 1
            fi
          fi

          # Validate build_env keys (if provided)
          if [ "${{ inputs.use_prebuilt_build }}" = "false" ]; then
            BUILD_ENV="${{ inputs.build_env }}"
            if [ -n "$BUILD_ENV" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                KEY="${line%%=*}"
                if ! echo "$KEY" | grep -qE '^[A-Z0-9_]+$'; then
                  echo "❌ Error: build_env key must be [A-Z0-9_]+, got: $KEY"
                  exit 1
                fi
              done < <(printf '%s\n' "${{ inputs.build_env }}")
            fi
          fi

          # Validate build artifact name
          if [ "${{ inputs.use_prebuilt_build }}" = "true" ] && [ -z "${{ inputs.build_artifact_name }}" ]; then
            echo "❌ Error: build_artifact_name is required when use_prebuilt_build is true"
            exit 1
          fi

          # Validate caller_repository format (owner/repo)
          if [ -n "${{ inputs.caller_repository }}" ]; then
            CALLER_REPO="${{ inputs.caller_repository }}"
            if ! echo "$CALLER_REPO" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
              echo "❌ Error: caller_repository must be in format 'owner/repo', got: $CALLER_REPO"
              exit 1
            fi
          fi

          # Validate caller_ref
          if [ -n "${{ inputs.caller_ref }}" ]; then
            CALLER_REF="${{ inputs.caller_ref }}"
            if echo "$CALLER_REF" | grep -qE '[;&|<>`$()]'; then
              echo "❌ Error: caller_ref contains potentially dangerous characters"
              exit 1
            fi
          fi

          # Validate pinata_action_ref
          PINATA_REF="${{ inputs.pinata_action_ref }}"
          if [ -z "$PINATA_REF" ]; then
            echo "❌ Error: pinata_action_ref cannot be empty"
            exit 1
          fi
          if echo "$PINATA_REF" | grep -qE '[;&|<>`$()]'; then
            echo "❌ Error: pinata_action_ref contains potentially dangerous characters"
            exit 1
          fi

          # Validate pinata_action_repository format (owner/repo)
          PINATA_REPO="${{ inputs.pinata_action_repository }}"
          if [ -z "$PINATA_REPO" ]; then
            echo "❌ Error: pinata_action_repository cannot be empty"
            exit 1
          fi
          if ! echo "$PINATA_REPO" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
            echo "❌ Error: pinata_action_repository must be in format 'owner/repo', got: $PINATA_REPO"
            exit 1
          fi

          echo "✅ Input validation passed"

      - name: Install caller dependencies
        if: ${{ !inputs.use_prebuilt_build }}
        timeout-minutes: 10
        working-directory: caller
        shell: bash
        run: |
          # Use detected default install command if install_command is the default value
          INSTALL_CMD="${{ inputs.install_command }}"
          if [ "$INSTALL_CMD" = "npm ci" ] && [ -n "${{ steps.detect_pm.outputs.default_install }}" ]; then
            INSTALL_CMD="${{ steps.detect_pm.outputs.default_install }}"
            echo "Using auto-detected install command: $INSTALL_CMD"
          fi
          
          # Run the install command
          $INSTALL_CMD

      - name: Set build environment variables
        if: ${{ !inputs.use_prebuilt_build && inputs.build_env != '' }}
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            KEY="${line%%=*}"
            VALUE="${line#*=}"
            printf '%s=%s\n' "$KEY" "$VALUE" >> "$GITHUB_ENV"
          done < <(printf '%s\n' "${{ inputs.build_env }}")

      - name: Build caller repo
        if: ${{ !inputs.use_prebuilt_build }}
        timeout-minutes: 30
        working-directory: caller
        shell: bash
        run: |
          ${{ inputs.build_command }}

      - name: Download prebuilt artifact
        if: ${{ inputs.use_prebuilt_build }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.build_artifact_name }}
          path: caller/${{ inputs.build_dir }}

      - name: Validate build output
        run: |
          BUILD_DIR="caller/${{ inputs.build_dir }}"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Error: Build directory '$BUILD_DIR' not found after build"
            exit 1
          fi

          FILE_COUNT=$(find "$BUILD_DIR" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ Error: Build directory '$BUILD_DIR' is empty"
            exit 1
          fi

          echo "✅ Build output validated: $FILE_COUNT files found"

      - name: Install pinata uploader dependencies
        timeout-minutes: 5
        working-directory: pinata
        shell: bash
        run: |
          # Install pnpm via npm (no Corepack needed)
          if ! command -v pnpm >/dev/null 2>&1; then
            echo "Installing pnpm via npm..."
            npm install -g pnpm
            echo "✅ pnpm installed"
          else
            echo "✅ pnpm already available"
          fi
          
          # Verify pnpm is available
          pnpm --version
          
          # Install dependencies for pinata uploader
          pnpm install --frozen-lockfile

      - name: Install jq/curl
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Prepare deployment dirs
        run: |
          mkdir -p deployments/${{ inputs.environment }} deployments/logs

      - name: Deploy to Pinata (IPFS)
        timeout-minutes: 20
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          UPLOAD_SCRIPT_PATH: pinata/scripts/upload-pinata.mjs
          PINATA_UPLOAD_TIMEOUT_MS: ${{ inputs.pinata_upload_timeout_ms }}
        run: |
          chmod +x pinata/scripts/deploy-to-pinata.sh
          TS="$(date +%Y%m%d-%H%M%S)"
          pinata/scripts/deploy-to-pinata.sh \
            "${{ inputs.environment }}" \
            "caller/${{ inputs.build_dir }}" \
            "${{ inputs.project_name }}" \
            "$TS" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}"

      - name: Extract deployment info
        id: deployment
        run: |
          FILE="deployments/${{ inputs.environment }}/latest.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ Deployment info not found at $FILE"
            exit 1
          fi

          # Validate JSON file
          if ! jq empty "$FILE" 2>/dev/null; then
            echo "❌ Invalid JSON in deployment file: $FILE"
            exit 1
          fi

          IPFS_HASH=$(jq -r '.ipfs_hash' "$FILE")

          if [ -z "$IPFS_HASH" ] || [ "$IPFS_HASH" = "null" ]; then
            echo "❌ Invalid or missing IPFS hash in deployment file"
            exit 1
          fi

          # Gateway URLs are owned by the deploy script and stored in the deployment
          # JSON — read them back here instead of re-defining the gateway list.
          PINATA_URL=$(jq -r '.pinata_url' "$FILE")
          if [ -z "$PINATA_URL" ] || [ "$PINATA_URL" = "null" ]; then
            echo "❌ Invalid or missing pinata_url in deployment file"
            exit 1
          fi

          echo "ipfs_hash=$IPFS_HASH" >> "$GITHUB_OUTPUT"
          echo "pinata_url=$PINATA_URL" >> "$GITHUB_OUTPUT"
          {
            echo "gateways<<__GATEWAYS_EOF__"
            jq -r '.urls.ipfs[]' "$FILE"
            echo "__GATEWAYS_EOF__"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Deployment info extracted successfully"

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployment-${{ inputs.environment }}-${{ github.sha }}
          path: |
            deployments/${{ inputs.environment }}/
            deployments/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Primary health check (Pinata gateway)
        if: ${{ success() && inputs.health_check }}
        run: |
          echo "🏥 Running primary health check for ${{ inputs.environment }} deployment..."

          PINATA_URL="${{ steps.deployment.outputs.pinata_url }}"
          if [ -z "$PINATA_URL" ] || [ "$PINATA_URL" = "null" ]; then
            echo "❌ Could not read pinata_url"
            exit 1
          fi

          sleep 5
          for i in {1..3}; do
            echo "Checking Pinata gateway (attempt $i): $PINATA_URL"
            if curl -s --head --max-time 30 "$PINATA_URL" > /dev/null; then
              echo "✅ Pinata gateway is accessible"
              exit 0
            else
              echo "⚠️ Pinata not accessible yet, retrying..."
              sleep 15
            fi
          done

          echo "❌ Pinata gateway not accessible after retries"
          exit 1

      - name: Test multi-gateway accessibility (informational)
        if: ${{ success() && inputs.health_check }}
        continue-on-error: true
        run: |
          echo "🌐 Testing deployment accessibility across gateways..."

          mapfile -t GATEWAYS <<< "${{ steps.deployment.outputs.gateways }}"

          SUCCESSFUL=0
          TOTAL=${#GATEWAYS[@]}

          for gateway in "${GATEWAYS[@]}"; do
            echo "Testing $gateway..."
            if curl -s --head --max-time 30 "$gateway" > /dev/null; then
              echo "✅ $gateway - accessible"
              ((SUCCESSFUL++))
            else
              echo "❌ $gateway - not accessible"
            fi
          done

          echo "📊 Accessibility: $SUCCESSFUL/$TOTAL gateways"

      - name: Summary
        if: success()
        run: |
          IPFS_HASH="${{ steps.deployment.outputs.ipfs_hash }}"
          PINATA_URL="${{ steps.deployment.outputs.pinata_url }}"

          # Gateway list comes from the deploy script (first = primary/dedicated).
          mapfile -t GATEWAYS <<< "${{ steps.deployment.outputs.gateways }}"

          # Derive both CID representations (v0 base58 "Qm...", v1 base32 "bafy...").
          CID_V0="$IPFS_HASH"
          CID_V1="$IPFS_HASH"
          if CID_OUT="$(node pinata/scripts/cid-convert.mjs "$IPFS_HASH" 2>/dev/null)"; then
            eval "$CID_OUT"
            CID_V0="$cid_v0"
            CID_V1="$cid_v1"
          fi

          {
            echo "# 🚀 ${{ inputs.environment }} Deployment Complete"
            echo ''
            echo '## 📊 Deployment Details'
            echo "- **Environment**: \`${{ inputs.environment }}\`"
            echo "- **Project**: \`${{ inputs.project_name }}\`"
            echo "- **Branch**: \`${{ github.ref_name }}\`"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Timestamp**: \`$(date -Iseconds)\`"
            echo ''
            echo '## 🌐 Primary Access URL'
            echo "- **Pinata Gateway**: [${GATEWAYS[0]}](${GATEWAYS[0]})"
            echo ''
            echo '## 🔗 Alternative Gateways'
            for gw in "${GATEWAYS[@]:1}"; do
              echo "- [${gw}](${gw})"
            done
            echo ''
            echo '## 📋 Technical Details'
            echo "- **CID (v0)**: \`${CID_V0}\`"
            echo "- **CID (v1)**: \`${CID_V1}\`"
          } >> "$GITHUB_STEP_SUMMARY"
