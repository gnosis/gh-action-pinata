name: Pinata IPFS Deploy (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment name (dev|prod).'
        required: true
        type: string
      project_name:
        description: 'Project name used for Pinata metadata.'
        required: true
        type: string
      pinata_upload_timeout_ms:
        description: 'Pinata upload HTTP request timeout in milliseconds.'
        required: false
        default: 300000
        type: number
      build_artifact_name:
        description: 'Name of the prebuilt artifact (uploaded earlier in the same run) to deploy.'
        required: true
        type: string
      build_dir:
        description: 'Directory the artifact is extracted into and deployed from.'
        required: false
        default: 'out'
        type: string
      pinata_action_repository:
        description: 'Repo to use for pinata action (owner/repo).'
        required: false
        default: 'gnosis/gh-action-pinata'
        type: string
      pinata_action_ref:
        description: "Git ref (branch/tag) to use for pinata action repo. Defaults to 'main'."
        required: false
        default: 'main'
        type: string
      health_check:
        description: 'Run post-deploy gateway health checks before writing the summary.'
        required: false
        default: true
        type: boolean
    secrets:
      PINATA_JWT:
        required: true
    outputs:
      ipfs_hash:
        description: 'Deployed IPFS hash.'
        value: ${{ jobs.deploy.outputs.ipfs_hash }}
      pinata_url:
        description: 'Pinata gateway URL for the deployed hash.'
        value: ${{ jobs.deploy.outputs.pinata_url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ipfs_hash: ${{ steps.deployment.outputs.ipfs_hash }}
      pinata_url: ${{ steps.deployment.outputs.pinata_url }}
    steps:
      - name: Checkout pinata deploy action repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.pinata_action_repository }}
          ref: ${{ inputs.pinata_action_ref }}
          fetch-depth: 1
          path: pinata

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pinata/pnpm-lock.yaml

      - name: Validate inputs
        run: |
          # Validate environment
          if [ "${{ inputs.environment }}" != "dev" ] && [ "${{ inputs.environment }}" != "prod" ]; then
            echo "❌ Error: environment must be 'dev' or 'prod', got: ${{ inputs.environment }}"
            exit 1
          fi

          # Validate Pinata upload timeout
          if [ "${{ inputs.pinata_upload_timeout_ms }}" -lt 10000 ]; then
            echo "❌ Error: pinata_upload_timeout_ms must be >= 10000"
            exit 1
          fi

          # Validate project_name
          PROJECT_NAME="${{ inputs.project_name }}"
          if [ -z "$PROJECT_NAME" ]; then
            echo "❌ Error: project_name cannot be empty"
            exit 1
          fi

          if echo "$PROJECT_NAME" | grep -qE '[^[:alnum:]_-]'; then
            echo "⚠️  Warning: project_name contains special characters, will be sanitized"
          fi

          # Validate build_dir
          BUILD_DIR="${{ inputs.build_dir }}"
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Error: build_dir cannot be empty"
            exit 1
          fi
          if echo "$BUILD_DIR" | grep -qE '\.\.|^/'; then
            echo "❌ Error: build_dir cannot contain '..' or be an absolute path, got: $BUILD_DIR"
            exit 1
          fi

          # Validate build artifact name
          if [ -z "${{ inputs.build_artifact_name }}" ]; then
            echo "❌ Error: build_artifact_name is required"
            exit 1
          fi

          # Validate pinata_action_ref
          PINATA_REF="${{ inputs.pinata_action_ref }}"
          if [ -z "$PINATA_REF" ]; then
            echo "❌ Error: pinata_action_ref cannot be empty"
            exit 1
          fi
          if echo "$PINATA_REF" | grep -qE '[;&|<>`$()]'; then
            echo "❌ Error: pinata_action_ref contains potentially dangerous characters"
            exit 1
          fi

          # Validate pinata_action_repository format (owner/repo)
          PINATA_REPO="${{ inputs.pinata_action_repository }}"
          if [ -z "$PINATA_REPO" ]; then
            echo "❌ Error: pinata_action_repository cannot be empty"
            exit 1
          fi
          if ! echo "$PINATA_REPO" | grep -qE '^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$'; then
            echo "❌ Error: pinata_action_repository must be in format 'owner/repo', got: $PINATA_REPO"
            exit 1
          fi

          echo "✅ Input validation passed"

      - name: Download prebuilt artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.build_artifact_name }}
          path: ${{ inputs.build_dir }}

      - name: Validate artifact contents
        run: |
          BUILD_DIR="${{ inputs.build_dir }}"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Error: Artifact directory '$BUILD_DIR' not found after download"
            exit 1
          fi

          FILE_COUNT=$(find "$BUILD_DIR" -type f | wc -l)
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ Error: Artifact directory '$BUILD_DIR' is empty"
            exit 1
          fi

          echo "✅ Artifact contents validated: $FILE_COUNT files found"

      - name: Install pinata uploader dependencies
        timeout-minutes: 5
        working-directory: pinata
        shell: bash
        run: |
          pnpm install --frozen-lockfile

      - name: Install jq/curl
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Prepare deployment dirs
        run: |
          mkdir -p deployments/${{ inputs.environment }} deployments/logs

      - name: Deploy to Pinata (IPFS)
        timeout-minutes: 20
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          UPLOAD_SCRIPT_PATH: pinata/scripts/upload-pinata.mjs
          PINATA_UPLOAD_TIMEOUT_MS: ${{ inputs.pinata_upload_timeout_ms }}
        run: |
          chmod +x pinata/scripts/deploy-to-pinata.sh
          TS="$(date +%Y%m%d-%H%M%S)"
          pinata/scripts/deploy-to-pinata.sh \
            "${{ inputs.environment }}" \
            "${{ inputs.build_dir }}" \
            "${{ inputs.project_name }}" \
            "$TS" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}"

      - name: Extract deployment info
        id: deployment
        run: |
          FILE="deployments/${{ inputs.environment }}/latest.json"
          if [ ! -f "$FILE" ]; then
            echo "❌ Deployment info not found at $FILE"
            exit 1
          fi

          # Validate JSON file
          if ! jq empty "$FILE" 2>/dev/null; then
            echo "❌ Invalid JSON in deployment file: $FILE"
            exit 1
          fi

          IPFS_HASH=$(jq -r '.ipfs_hash' "$FILE")

          if [ -z "$IPFS_HASH" ] || [ "$IPFS_HASH" = "null" ]; then
            echo "❌ Invalid or missing IPFS hash in deployment file"
            exit 1
          fi

          # Gateway URLs are owned by the deploy script and stored in the deployment
          # JSON — read them back here instead of re-defining the gateway list.
          PINATA_URL=$(jq -r '.pinata_url' "$FILE")
          if [ -z "$PINATA_URL" ] || [ "$PINATA_URL" = "null" ]; then
            echo "❌ Invalid or missing pinata_url in deployment file"
            exit 1
          fi

          echo "ipfs_hash=$IPFS_HASH" >> "$GITHUB_OUTPUT"
          echo "pinata_url=$PINATA_URL" >> "$GITHUB_OUTPUT"
          {
            echo "gateways<<__GATEWAYS_EOF__"
            jq -r '.urls.ipfs[]' "$FILE"
            echo "__GATEWAYS_EOF__"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Deployment info extracted successfully"

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deployment-${{ inputs.environment }}-${{ github.sha }}
          path: |
            deployments/${{ inputs.environment }}/
            deployments/logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Primary health check (Pinata gateway)
        if: ${{ success() && inputs.health_check }}
        run: |
          echo "🏥 Running primary health check for ${{ inputs.environment }} deployment..."

          PINATA_URL="${{ steps.deployment.outputs.pinata_url }}"
          if [ -z "$PINATA_URL" ] || [ "$PINATA_URL" = "null" ]; then
            echo "❌ Could not read pinata_url"
            exit 1
          fi

          sleep 5
          for i in {1..3}; do
            echo "Checking Pinata gateway (attempt $i): $PINATA_URL"
            if curl -s --head --max-time 30 "$PINATA_URL" > /dev/null; then
              echo "✅ Pinata gateway is accessible"
              exit 0
            else
              echo "⚠️ Pinata not accessible yet, retrying..."
              sleep 15
            fi
          done

          echo "❌ Pinata gateway not accessible after retries"
          exit 1

      - name: Test multi-gateway accessibility (informational)
        if: ${{ success() && inputs.health_check }}
        continue-on-error: true
        run: |
          echo "🌐 Testing deployment accessibility across gateways..."

          mapfile -t GATEWAYS <<< "${{ steps.deployment.outputs.gateways }}"

          SUCCESSFUL=0
          TOTAL=${#GATEWAYS[@]}

          for gateway in "${GATEWAYS[@]}"; do
            echo "Testing $gateway..."
            if curl -s --head --max-time 30 "$gateway" > /dev/null; then
              echo "✅ $gateway - accessible"
              ((SUCCESSFUL++))
            else
              echo "❌ $gateway - not accessible"
            fi
          done

          echo "📊 Accessibility: $SUCCESSFUL/$TOTAL gateways"

      - name: Summary
        if: success()
        run: |
          IPFS_HASH="${{ steps.deployment.outputs.ipfs_hash }}"
          PINATA_URL="${{ steps.deployment.outputs.pinata_url }}"

          # Gateway list comes from the deploy script (first = primary/dedicated).
          mapfile -t GATEWAYS <<< "${{ steps.deployment.outputs.gateways }}"

          # Derive both CID representations (v0 base58 "Qm...", v1 base32 "bafy...").
          CID_V0="$IPFS_HASH"
          CID_V1="$IPFS_HASH"
          if CID_OUT="$(node pinata/scripts/cid-convert.mjs "$IPFS_HASH" 2>/dev/null)"; then
            eval "$CID_OUT"
            CID_V0="$cid_v0"
            CID_V1="$cid_v1"
          fi

          {
            echo "# 🚀 ${{ inputs.environment }} Deployment Complete"
            echo ''
            echo '## 📊 Deployment Details'
            echo "- **Environment**: \`${{ inputs.environment }}\`"
            echo "- **Project**: \`${{ inputs.project_name }}\`"
            echo "- **Branch**: \`${{ github.ref_name }}\`"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Timestamp**: \`$(date -Iseconds)\`"
            echo ''
            echo '## 🌐 Primary Access URL'
            echo "- **Pinata Gateway**: [${GATEWAYS[0]}](${GATEWAYS[0]})"
            echo ''
            echo '## 🔗 Alternative Gateways'
            for gw in "${GATEWAYS[@]:1}"; do
              echo "- [${gw}](${gw})"
            done
            echo ''
            echo '## 📋 Technical Details'
            echo "- **CID (v0)**: \`${CID_V0}\`"
            echo "- **CID (v1)**: \`${CID_V1}\`"
          } >> "$GITHUB_STEP_SUMMARY"
